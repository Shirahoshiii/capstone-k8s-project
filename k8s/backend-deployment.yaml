apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: capstone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: shirahoshiii/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: capstone
spec:
  selector:
    app: backend
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007